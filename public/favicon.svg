<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#0a0a0f"/>

  <!-- Corner crosshair — top left -->
  <line x1="4" y1="12" x2="4" y2="4" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="4" x2="12" y2="4" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Corner crosshair — top right -->
  <line x1="60" y1="12" x2="60" y2="4" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="4" x2="52" y2="4" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Corner crosshair — bottom left -->
  <line x1="4" y1="52" x2="4" y2="60" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="60" x2="12" y2="60" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Corner crosshair — bottom right -->
  <line x1="60" y1="52" x2="60" y2="60" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="52" y2="60" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- NS letters bold tactical -->
  <text
    x="32"
    y="43"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="28"
    letter-spacing="-1"
    fill="#f0a500"
    filter="url(#glow)"
  >NS</text>
</svg>
